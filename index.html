html<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>買い物リスト</title>
</head>
<body>
  <h1>買い物リスト</h1>
  <input id="itemInput" type="text" placeholder="アイテムを入力">
  <button onclick="addItem()">追加</button>
  <ul id="list"></ul>

  <script>
    // 配列：リストのデータを入れる箱
    let items = [];

    function addItem() {
      // 入力欄から文字を取得
      let item = document.getElementById("itemInput").value;

      // 空っぽなら何もしない
      if (item === "") return;

      // 配列にアイテムを追加
      items.push(item);

      // 入力欄を空にする
      document.getElementById("itemInput").value = "";

      // リストを画面に表示
      showList();
    }

    function showList() {
      let listEl = document.getElementById("list");
      listEl.innerHTML = "";

      // ループで配列の中身を全部表示
      for (let i = 0; i < items.length; i++) {
        let li = document.createElement("li");
        li.textContent = items[i];
        listEl.appendChild(li);
      }
    }
  </script>
</body>
</html>
