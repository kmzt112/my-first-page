<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はじめてのページ</title>
</head>
<body>
  <h1>こんにちは！</h1>
  <button onclick="greet()">押してみて</button>
  <p id="message"></p>

  <script>
    function greet() {
      document.getElementById("message").textContent = "JavaScriptが動いてるよ！🎉";
    }
  </script>
</body>
</html>
